<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                TechStore
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Início</a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>

    <main class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow p-4">

                    <h2 class="text-center mb-4">
                        Finalizar Compra
                    </h2>

                    <div class="text-center mb-4">
                        <img id="imgPagamento" class="img-fluid rounded" style="max-height:300px;">
                    </div>

                    <h3 id="nomePagamento"></h3>

                    <p id="descricaoPagamento"></p>

                    <h4 class="text-success mb-4" id="precoPagamento"></h4>

                    <form id="formPagamento">

                        <div class="mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Número do Cartão</label>
                            <input type="text" class="form-control" placeholder="0000 0000 0000 0000" required>
                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Validade</label>
                                <input type="text" class="form-control" placeholder="MM/AA" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">CVV</label>
                                <input type="password" class="form-control" maxlength="3" required>
                            </div>

                        </div>

                        <button class="btn btn-success w-100">
                            Confirmar Pagamento
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </main>

    <footer class="bg-dark text-white text-center p-3 mt-5">
        © 2026 TechStore - Todos os direitos reservados.
    </footer>

    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
